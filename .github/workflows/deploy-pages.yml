name: Deploy Skool Copilot PWA to GitHub Pages

# Note: deploys run from the feature branch only. The github-pages
# environment's protection rules were auto-created allowing this branch
# (the first deployer); pushes from main get rejected in ~2s and, worse,
# the concurrency group makes them cancel in-flight branch deploys.
# main stays the code source of truth; it's kept in sync with this branch.
on:
  push:
    branches: [claude/fable-5-skool-copilot-q2605p]
    paths:
      - "skool-copilot/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # Creates the Pages site on first run if it doesn't exist yet.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      # The whole skool-copilot folder is the site: the PWA lives at
      # /pwa/ and references ../extension/shared/* and ../supabase/*.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: skool-copilot

      - id: deployment
        uses: actions/deploy-pages@v4
